name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  api-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn workspace @eoneom/api-client build
      - uses: actions/upload-artifact@v4
        with:
          name: api-client-dist
          path: packages/api-client/dist/

  server:
    needs: api-client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: yarn install --immutable
      - uses: actions/download-artifact@v4
        with:
          name: api-client-dist
          path: packages/api-client/dist
      - run: yarn workspace @eoneom/server build
      - run: yarn workspace @eoneom/server test

  web:
    needs: api-client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: yarn install --immutable
      - uses: actions/download-artifact@v4
        with:
          name: api-client-dist
          path: packages/api-client/dist
      - run: yarn workspace @eoneom/web build
      - run: yarn workspace @eoneom/web test:ci
