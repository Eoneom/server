# https://docs.codecov.com/docs/codecov-yaml
coverage:
  status:
    project:
      default:
        target: auto
    patch:
      default:
        target: auto

ignore:
  - "**/dist/**"
  - "**/node_modules/**"
  - "**/src/adapter/**"

flag_management:
  default_rules:
    - if: true
      carryforward: true
